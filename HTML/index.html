<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge" >
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kusinang Ina</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
  <script>
    document.querySelectorAll('.loc-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>
</head>
<body>
  <header>
    <h2>Kusinang Ina</h2>
    <nav>
      <ul>
        <li><a class="links" id="change" href="index.html">Home</a></li>
        <li><a class="links" href="dishes.html">Dishes</a></li>
        <li><a class="links" href="restaurants.html">Restaurants</a></li>
        <li><a class="links" href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <div class="register-btn">
      <a href="#">Sign Up</a>
      <a href="#">Log In</a>
    </div>
  </header>
  <main class="hero-banner">
    <p class="eyebrow">Filipino cuisine in New Zealand</p>
    <h1>Discover the taste of home, right here in NZ</h1>
    <p class="hero-sub">Find your favourite Filipino dish and the restaurants serving it near you</p>
    <form class="search-form">
      <div class="search">
        <span class="material-symbols-outlined" id="search-icon">search</span>
        <input class="search-input" type="search" placeholder="Search dishes, e.g. adobo, sinigang...">
        <button type="submit" class="search-btn">Search</button>
      </div>
    </form>
    <p class="loc-label">Browse by city</p>
    <div class="locations">
      <button class="loc-btn active" type="button">Auckland</button>
      <button class="loc-btn" type="button">Wellington</button>
      <button class="loc-btn" type="button">Christchurch</button>
      <button class="loc-btn" type="button">Hamilton</button>
      <button class="loc-btn" type="button">Tauranga</button>
      <button class="loc-btn" type="button">Dunedin</button>
    </div>
  </main>
  </main>
</body>





</html>
