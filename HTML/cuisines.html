            <img src="/IMG/Bangus Sisig (Milkfish Sisig).jpg" alt="Sisig">

        </div> 
        <div class="card-container" onclick="openModal('Sinigang','Dish','ti-bowl-chopsticks','Your sinigang description here...','Luzon, Philippines','Beef · Sour · Soup', '/IMG/Sinigang Na Baka.jpg')">
          <div class="card-image">
            <img src="/IMG/Sinigang Na Baka.jpg" alt="Sisig">
          </div>

            <span class="card-tag">Dish</span>
            <h3 class="card-title">Sisig</h3>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal" onclick="closeOnOverlay(event)">
      <div class="modal-box">
        <button class="modal-close" onclick="closeModal()" aria-label="Close modal">✕</button>
        <div class="modal-img">
          <img id="modal-img-el" src="/IMG/Bangus Sisig (Milkfish Sisig).jpg" alt="Sisig" style="width:100%;height:100%;object-fit:cover;display:block;">
          <i id="modal-icon" style="font-size:52px;color:#E8A020;"></i>
        </div>
        <div class="modal-body">
          <span class="modal-tag" id="modal-tag"></span>
          <h3 class="modal-title" id="modal-title"></h3>
          <p class="modal-desc" id="modal-desc"></p>
          <div class="modal-meta">
            <div class="modal-meta-row">📍 <span id="modal-origin"></span></div>
            <div class="modal-meta-row">🏷 <span id="modal-tags"></span></div>
          </div>
        </div>
      </div>
    </div>
    <!--SCRIPT FOR MODAL TO WORK-->
  <script>
    function openModal(title, tag, icon, desc, origin, tags, imgSrc) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-tag').textContent = tag;
      document.getElementById('modal-desc').textContent = desc;
      document.getElementById('modal-origin').textContent = origin;
      document.getElementById('modal-tags').textContent = tags;

      const imgEl = document.getElementById('modal-img-el');
      const iconEl = document.getElementById('modal-icon');

      if (imgSrc) {
        imgEl.src = imgSrc;
        imgEl.alt = title;
        imgEl.style.display = 'block';   // show image
        iconEl.style.display = 'none';   // hide icon
      } else {
        imgEl.style.display = 'none';    // hide image
        iconEl.className = 'ti ti-' + icon;
        iconEl.style.display = 'block';  // show icon
      }

      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    function closeOnOverlay(e) {
      if (e.target === document.getElementById('modal')) closeModal();
    }
  </script>   
  </body>
</html>
